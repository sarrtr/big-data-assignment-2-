services:
  cluster-master:
    image: firasj/spark-docker-cluster
    container_name: cluster-master
    ports:
      - "8088:8088"
      - "4040:4040"
      - "19888:19888"
      - "9000:9000"
      - "9870:9870"
    volumes:
      - ".:/workspace"
    networks:
      - spark-cluster
    depends_on:
      - cluster-slave-1
      - cassandra-server
    hostname: cluster-master
    tty: true
    working_dir: /workspace/app
    entrypoint: ["bash", "/workspace/app/app.sh"]

  cluster-slave-1:
    image: firasj/spark-docker-cluster
    container_name: cluster-slave-1
    networks:
      - spark-cluster
    hostname: cluster-slave-1
    tty: true

  cassandra-server:
    image: cassandra:4.1
    container_name: cassandra-server
    ports:
      - "7000:7000"
    networks:
      - spark-cluster

networks:
  spark-cluster:
    driver: bridge
